name: CI & Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: 單元測試
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安裝開發依賴
        run: npm ci || npm install
      - name: 執行 Node 單元測試
        run: npm test
      - name: 檢查 JavaScript 語法
        run: |
          shopt -s nullglob
          for f in src/*.js scripts/*.js; do
            node -c "$f"
            echo "checked $f"
          done

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安裝 Playwright 與 Chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: 執行真瀏覽器 E2E
        run: npm run test:e2e
      - name: 執行 RWD 矩陣守門（9 視口零違規）
        run: npm run test:rwd

  deploy:
    name: 部署 GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 設定 Pages
        uses: actions/configure-pages@v5
      - name: 上傳 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
