<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111317" />
    <link rel="manifest" href="manifest.webmanifest?v=R56" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png?v=R56" />
    <title>灰燼護航</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111317;
        --panel: rgba(18, 22, 27, 0.92);
        --panel-strong: rgba(9, 12, 16, 0.96);
        --line: rgba(221, 211, 178, 0.26);
        --text: #f4ead8;
        --muted: #b8b0a3;
        --accent: #f0b64a;
        --accent-2: #5ed4cb;
        --danger: #e15f4f;
        --ok: #87d27d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overscroll-behavior: none;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
      }

      button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #232a31;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        touch-action: manipulation;
      }

      button:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--accent-2);
        outline-offset: 2px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .app {
        position: relative;
        width: min(100vw, calc(100svh * 390 / 844));
        max-width: 820px;
        height: min(100svh, calc(100vw * 844 / 390));
        max-height: 1180px;
        aspect-ratio: 390 / 844;
        overflow: hidden;
        background: #0a0c0f;
      }

      @media (min-width: 860px) {
        .app {
          width: min(46vw, 520px);
          height: min(96vh, 1125px);
          border: 1px solid rgba(244, 234, 216, 0.16);
        }
      }

      #gameCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        touch-action: none;
      }

      .hud {
        position: absolute;
        inset: max(10px, env(safe-area-inset-top)) 10px auto 10px;
        display: none;
        gap: 8px;
        pointer-events: none;
        z-index: 6;
      }

      .hud.is-visible {
        display: grid;
      }

      .hud-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
      }

      .stat,
      .boss,
      .mods {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 13, 16, 0.74);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.22);
      }

      .stat {
        min-height: 44px;
        padding: 7px 9px;
        display: grid;
        gap: 4px;
      }

      .stat-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .bar {
        position: relative;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .bar > i {
        display: block;
        height: 100%;
        width: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--danger), var(--accent));
      }

      .shield-bar {
        height: 5px;
        background: rgba(94, 212, 203, 0.14);
      }

      .shield-bar[hidden] {
        display: none;
      }

      .shield-bar > i {
        background: linear-gradient(90deg, #2f8792, var(--accent-2));
      }

      .pill {
        min-height: 44px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 13, 16, 0.74);
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .hud button {
        pointer-events: auto;
        min-width: 44px;
        padding: 0 10px;
        background: rgba(35, 42, 49, 0.9);
      }

      .mods {
        min-height: 30px;
        padding: 6px 9px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      body.font-small .hud,
      body.font-small .settlement-list,
      body.font-small .settlement-badges,
      body.font-small .settlement-recommendation,
      body.font-small .run-analysis,
      body.font-small .quest-list,
      body.font-small .settings-list {
        font-size: 12px;
      }

      body.font-large .hud,
      body.font-large .settlement-list,
      body.font-large .settlement-badges,
      body.font-large .settlement-recommendation,
      body.font-large .run-analysis,
      body.font-large .quest-list,
      body.font-large .settings-list {
        font-size: 15px;
      }

      body.font-small .quest-card strong,
      body.font-small .achievement strong,
      body.font-small .event-codex strong,
      body.font-small .settings-row small,
      body.font-small .quest-card small,
      body.font-small .settlement-recommendation small,
      body.font-small .run-analysis-section small {
        font-size: 11px;
      }

      body.font-large .quest-card strong,
      body.font-large .achievement strong,
      body.font-large .event-codex strong,
      body.font-large .settings-row small,
      body.font-large .quest-card small,
      body.font-large .settlement-recommendation small,
      body.font-large .run-analysis-section small {
        font-size: 14px;
      }

      .boss {
        display: none;
        min-height: 38px;
        padding: 7px 9px;
      }

      .boss.is-visible {
        display: grid;
        gap: 5px;
      }

      .boss-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .boss-telegraph {
        min-height: 16px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .event-banner {
        position: absolute;
        z-index: 8;
        left: 18px;
        right: 18px;
        top: max(96px, calc(env(safe-area-inset-top) + 96px));
        min-height: 48px;
        padding: 9px 12px;
        border: 1px solid rgba(240, 182, 74, 0.74);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.88);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.36);
        text-align: center;
        pointer-events: none;
      }

      .event-banner strong,
      .event-banner span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .event-banner strong {
        color: var(--accent);
        font-size: 14px;
      }

      .event-banner span {
        margin-top: 2px;
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
      }

      .event-banner[hidden] {
        display: none;
      }

      .gate-choice-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      .gate-choice-layer[hidden] {
        display: none;
      }

      .gate-choice-btn {
        position: absolute;
        left: 0;
        top: 0;
        width: 112px;
        min-height: 68px;
        padding: 7px 8px;
        transform: translate3d(var(--gate-x, 0), var(--gate-y, 0), 0) translate(-50%, -50%);
        will-change: transform;
        border-color: rgba(240, 182, 74, 0.88);
        background: rgba(9, 12, 16, 0.78);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.34);
        pointer-events: auto;
        touch-action: manipulation;
      }

      .gate-choice-btn b,
      .gate-choice-btn span,
      .gate-choice-btn small {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .gate-choice-btn b {
        color: var(--text);
        font-size: 16px;
      }

      .gate-choice-btn span {
        color: var(--accent);
        font-size: 18px;
        line-height: 1.1;
      }

      .gate-choice-btn small {
        color: var(--muted);
        font-size: 10px;
      }

      .supply-choice-overlay,
      .gate-choice-overlay {
        position: absolute;
        inset: 0;
        z-index: 8;
        display: grid;
        place-items: center;
        padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
        background: rgba(4, 6, 10, 0.56);
        pointer-events: auto;
      }

      .supply-choice-overlay[hidden],
      .gate-choice-overlay[hidden] {
        display: none;
      }

      .supply-choice-panel {
        width: min(356px, 100%);
        max-height: min(calc(100dvh - 24px), calc(100% - 24px));
        overflow-y: auto;
        padding: 12px;
        border: 1px solid rgba(94, 212, 203, 0.55);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.92);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.48);
      }

      .supply-choice-head {
        display: grid;
        gap: 3px;
        margin-bottom: 10px;
      }

      .supply-choice-head strong {
        color: var(--accent-2);
        font-size: 16px;
      }

      .supply-choice-head span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .supply-choice-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(142px, 1fr));
        gap: 8px;
      }

      .supply-choice-btn {
        min-height: 68px;
        padding: 9px 10px;
        text-align: left;
        border-color: rgba(94, 212, 203, 0.72);
        background: rgba(13, 24, 28, 0.82);
        touch-action: manipulation;
      }

      .supply-choice-btn b,
      .supply-choice-btn span,
      .supply-choice-btn small {
        display: block;
        overflow-wrap: anywhere;
      }

      .supply-choice-btn b {
        color: var(--text);
        font-size: 14px;
      }

      .supply-choice-btn span {
        margin-top: 3px;
        color: var(--accent-2);
        font-size: 13px;
        font-weight: 900;
      }

      .supply-choice-btn small {
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
      }

      .gate-choice-overlay .supply-choice-panel {
        border-color: rgba(240, 182, 74, 0.62);
      }

      .gate-option-btn {
        border-color: rgba(240, 182, 74, 0.74);
        background: rgba(31, 22, 12, 0.84);
      }

      .gate-option-btn span {
        color: var(--accent);
      }

      .trailer-overlay {
        position: absolute;
        inset: 0;
        z-index: 9;
        display: grid;
        grid-template-rows: minmax(260px, 46%) minmax(0, 1fr);
        gap: 10px;
        padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
        background: rgba(5, 7, 10, 0.94);
        overflow: hidden;
      }

      .trailer-overlay[hidden] {
        display: none;
      }

      .trailer-room-stage {
        position: relative;
        min-height: 0;
        border: 1px solid rgba(240, 182, 74, 0.28);
        border-radius: 8px;
        overflow: hidden;
        background: #0b0d10;
      }

      .trailer-room-canvas {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
      }

      .trailer-panel {
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(14, 17, 21, 0.96);
        overflow: hidden;
      }

      .trailer-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: start;
      }

      .trailer-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .trailer-resources {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .trailer-room-body {
        min-height: 0;
        display: grid;
        grid-template-columns: 0.78fr 1.22fr;
        gap: 10px;
        overflow: hidden;
      }

      .trailer-column {
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        display: grid;
        align-content: start;
        gap: 8px;
        padding-right: 2px;
      }

      .trailer-slot,
      .trailer-furniture {
        display: grid;
        gap: 5px;
        min-height: 58px;
        padding: 9px;
        border: 1px solid rgba(221, 211, 178, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }

      .trailer-slot.is-filled,
      .trailer-furniture.is-owned {
        border-color: rgba(135, 210, 125, 0.38);
        background: rgba(135, 210, 125, 0.06);
      }

      .trailer-slot strong,
      .trailer-furniture strong {
        font-size: 13px;
      }

      .trailer-slot small,
      .trailer-furniture small {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .trailer-furniture {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .trailer-furniture button {
        min-width: 86px;
        padding: 0 8px;
        font-size: 12px;
      }

      @media (max-width: 430px), (max-height: 740px) {
        .trailer-overlay {
          grid-template-rows: minmax(220px, 38%) minmax(0, 1fr);
        }

        .trailer-room-body {
          display: block;
          grid-template-columns: 1fr;
          overflow-y: auto;
        }

        .trailer-column {
          overflow: visible;
        }

        .trailer-column + .trailer-column {
          margin-top: 8px;
        }
      }

      @media (max-height: 500px) {
        .trailer-overlay {
          grid-template-rows: 112px minmax(0, 1fr);
          gap: 6px;
          padding: max(6px, env(safe-area-inset-top)) 6px max(6px, env(safe-area-inset-bottom));
        }

        .trailer-panel {
          grid-template-rows: auto auto minmax(76px, 1fr);
          gap: 6px;
          padding: 8px;
        }

        .trailer-head h2 {
          font-size: 14px;
        }

        .trailer-head .subtle {
          display: none;
        }

        .trailer-resources {
          font-size: 10px;
        }

        .trailer-slot,
        .trailer-furniture {
          min-height: 50px;
          padding: 7px;
        }
      }

      .panel {
        position: absolute;
        inset: auto 10px max(10px, env(safe-area-inset-bottom)) 10px;
        max-height: min(calc(100% - 24px), calc(100dvh - 24px));
        padding: 12px;
        overflow: auto;
        overscroll-behavior: contain;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.42);
        touch-action: pan-y;
      }

      .panel[hidden] {
        display: none;
      }

      .panel h1,
      .panel h2 {
        margin: 0;
        letter-spacing: 0;
      }

      .panel h1 {
        font-size: 28px;
        line-height: 1.05;
      }

      .panel h2 {
        font-size: 18px;
      }

      .panel-head {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .subtle {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .garage-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .vehicle-list,
      .upgrade-list,
      .settlement-list {
        display: grid;
        gap: 8px;
      }

      .vehicle {
        display: grid;
        grid-template-columns: 52px 1fr auto;
        gap: 10px;
        align-items: center;
        min-height: 72px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .vehicle.is-selected {
        border-color: rgba(240, 182, 74, 0.82);
        background: rgba(240, 182, 74, 0.1);
      }

      .vehicle.is-locked {
        border-color: rgba(184, 176, 163, 0.18);
        background: rgba(255, 255, 255, 0.028);
      }

      .vehicle-thumb {
        width: 44px;
        height: 64px;
        object-fit: contain;
        image-rendering: pixelated;
        filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.38));
      }

      .vehicle.is-locked .vehicle-thumb {
        opacity: 0.82;
        filter: grayscale(1) brightness(0.18) contrast(1.45) drop-shadow(0 5px 8px rgba(0, 0, 0, 0.38));
      }

      .vehicle-name {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 8px;
        font-weight: 900;
      }

      .vehicle small,
      .upgrade small {
        color: var(--muted);
        font-size: 12px;
      }

      .vehicle-actions {
        display: grid;
        gap: 6px;
        min-width: 78px;
      }

      .vehicle-actions button {
        width: 100%;
        padding: 0 8px;
        font-size: 12px;
      }

      .wishlist-btn.is-active {
        border-color: rgba(94, 212, 203, 0.72);
        background: rgba(94, 212, 203, 0.16);
      }

      .upgrade {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        min-height: 64px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .upgrade.is-special {
        border-color: rgba(94, 212, 203, 0.28);
        background: rgba(94, 212, 203, 0.06);
      }

      .achievement-list,
      .milestone-list {
        display: grid;
        gap: 8px;
      }

      .milestone-list {
        margin-bottom: 10px;
      }

      .milestone-progress {
        width: 100%;
        height: 6px;
        overflow: hidden;
        border: 1px solid rgba(94, 212, 203, 0.22);
        border-radius: 999px;
        background: rgba(4, 8, 11, 0.42);
      }

      .milestone-progress > i {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, rgba(94, 212, 203, 0.84), rgba(240, 182, 74, 0.9));
      }

      .quest-list,
      .settings-list {
        display: grid;
        gap: 8px;
      }

      .settings-list {
        margin-top: 10px;
      }

      .settings-row,
      .quest-card {
        display: grid;
        gap: 6px;
        min-height: 62px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .settings-row {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .settings-row select,
      .settings-row input {
        min-height: 38px;
      }

      .save-manager {
        display: grid;
        gap: 8px;
        padding: 9px 10px;
        border: 1px solid rgba(94, 212, 203, 0.28);
        border-radius: 8px;
        background: rgba(94, 212, 203, 0.055);
      }

      .save-manager textarea {
        width: 100%;
        min-height: 76px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.76);
        color: var(--text);
        font: inherit;
        font-size: 12px;
      }

      .quest-card.is-ready {
        border-color: rgba(240, 182, 74, 0.66);
        background: rgba(240, 182, 74, 0.08);
      }

      .quest-card.is-claimed {
        border-color: rgba(135, 210, 125, 0.42);
        background: rgba(135, 210, 125, 0.07);
      }

      .quest-card strong {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
      }

      .quest-card small,
      .settings-row small {
        color: var(--muted);
        line-height: 1.35;
      }

      .event-codex-list {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .event-codex {
        display: grid;
        gap: 4px;
        min-height: 66px;
        padding: 9px 10px;
        border: 1px solid rgba(94, 212, 203, 0.3);
        border-radius: 8px;
        background: rgba(94, 212, 203, 0.055);
      }

      .event-codex strong {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
      }

      .event-codex small {
        color: var(--muted);
        line-height: 1.35;
      }

      .achievement {
        display: grid;
        gap: 4px;
        min-height: 66px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .achievement.is-done {
        border-color: rgba(135, 210, 125, 0.45);
        background: rgba(135, 210, 125, 0.08);
      }

      .achievement.is-ready {
        border-color: rgba(94, 212, 203, 0.5);
        background: rgba(94, 212, 203, 0.08);
      }

      .achievement strong {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
      }

      .achievement small {
        color: var(--muted);
        line-height: 1.35;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .actions .wide {
        grid-column: 1 / -1;
      }

      .primary {
        background: #d5932f;
        border-color: #f3cf70;
        color: #17110a;
      }

      .secondary {
        background: #17454a;
        border-color: rgba(94, 212, 203, 0.62);
      }

      .danger {
        background: #5a201d;
        border-color: rgba(225, 95, 79, 0.62);
      }

      .settlement-list {
        grid-template-columns: 1fr 1fr;
      }

      .settlement-item {
        min-height: 58px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .settlement-item b {
        display: block;
        margin-bottom: 4px;
        font-size: 18px;
      }

      .settlement-badges,
      .settlement-recommendation {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .settlement-badge,
      .settlement-recommendation {
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .settlement-badge {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .settlement-recommendation[hidden],
      .settlement-badges[hidden] {
        display: none;
      }

      .settlement-recommendation strong {
        display: block;
        margin-bottom: 4px;
      }

      .settlement-recommendation small {
        display: block;
        color: var(--muted);
        line-height: 1.4;
      }

      .settlement-recommendation button {
        width: 100%;
        margin-top: 8px;
      }

      .run-analysis-toggle {
        width: 100%;
        margin-top: 10px;
      }

      .run-analysis {
        display: grid;
        gap: 8px;
        margin-top: 8px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .run-analysis[hidden] {
        display: none;
      }

      .run-analysis-section {
        display: grid;
        gap: 2px;
      }

      .run-analysis-section strong {
        font-size: 12px;
      }

      .run-analysis-section small {
        color: var(--muted);
        line-height: 1.35;
      }

      .status {
        min-height: 22px;
        margin-top: 8px;
        color: var(--accent-2);
        font-size: 12px;
      }

      .series-footer {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(221, 211, 178, 0.18);
        color: var(--muted);
        font-size: 12px;
      }

      .series-title {
        margin-bottom: 7px;
        font-weight: 800;
      }

      .series-links {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .series-links a {
        min-height: 32px;
        padding: 7px 9px;
        border: 1px solid rgba(221, 211, 178, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        color: var(--muted);
        text-decoration: none;
        white-space: nowrap;
      }

      .meta-panel.is-illustration,
      .meta-panel.is-shelter {
        inset: 0;
        max-height: none;
        padding: 0;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #07090d;
        box-shadow: none;
        touch-action: none;
      }

      .meta-panel.is-illustration::after,
      .meta-panel.is-shelter::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0.06) 24%, rgba(0, 0, 0, 0.42) 100%),
          radial-gradient(circle at 50% 44%, rgba(255, 218, 150, 0.08), rgba(0, 0, 0, 0) 52%);
        pointer-events: none;
      }

      .shelter-image,
      .shelter-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .shelter-image {
        object-fit: cover;
        object-position: center center;
        background: #07090d;
      }

      .shelter-canvas {
        image-rendering: pixelated;
      }

      .shelter-image[hidden],
      .shelter-canvas[hidden],
      .hotspot-layer[hidden] {
        display: none;
      }

      .meta-summary {
        position: relative;
        z-index: 2;
      }

      .is-illustration .meta-summary,
      .is-shelter .meta-summary {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        padding: 10px 12px;
        border: 1px solid rgba(244, 234, 216, 0.18);
        border-radius: 8px;
        background: rgba(7, 9, 13, 0.72);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.72);
        pointer-events: none;
      }

      .is-illustration .meta-summary h1,
      .is-shelter .meta-summary h1 {
        font-size: 30px;
        line-height: 1.02;
      }

      .is-illustration .meta-summary .status,
      .is-shelter .meta-summary .status {
        min-height: 18px;
        margin-top: 4px;
      }

      .hotspot-layer {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: max(10px, env(safe-area-inset-bottom));
        z-index: 3;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(244, 234, 216, 0.18);
        border-radius: 8px;
        background: rgba(7, 9, 13, 0.68);
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
        pointer-events: auto;
        max-height: min(34%, calc(100dvh - 24px));
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .hotspot-btn {
        position: static;
        min-width: 0;
        min-height: 42px;
        padding: 8px 10px;
        border-color: rgba(244, 234, 216, 0.34);
        background: rgba(9, 12, 16, 0.72);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
        color: var(--text);
        pointer-events: auto;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.72);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hotspot-primary {
        grid-column: 1 / -1;
        min-height: 50px;
        background: rgba(213, 147, 47, 0.88);
        border-color: rgba(243, 207, 112, 0.92);
        color: #17110a;
        font-size: 18px;
        text-shadow: none;
      }

      .meta-drawer {
        position: relative;
        z-index: 4;
      }

      .is-illustration .meta-drawer,
      .is-shelter .meta-drawer {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: calc(max(10px, env(safe-area-inset-bottom)) + 176px);
        max-height: min(50%, 480px, calc(100dvh - 220px));
        padding: 12px;
        overflow: auto;
        overscroll-behavior: contain;
        border: 1px solid rgba(244, 234, 216, 0.22);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.92);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.44);
        touch-action: pan-y;
      }

      .meta-drawer[hidden] {
        display: none;
      }

      .meta-drawer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .meta-drawer-head button {
        min-height: 36px;
        padding: 0 10px;
      }

      .meta-section[hidden] {
        display: none;
      }

      .is-fallback .shelter-image,
      .is-fallback .shelter-canvas {
        display: none;
      }

      .is-fallback .hotspot-layer {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin: 10px 0;
      }

      .is-fallback .meta-drawer {
        display: block;
      }

      .is-fallback .meta-drawer-head {
        display: none;
      }

      .is-fallback .meta-section {
        display: block;
      }

      .is-illustration #startBtn,
      .is-shelter #startBtn {
        display: none;
      }

      .meta-actions {
        margin-top: 10px;
        position: sticky;
        bottom: 0;
        padding-top: 8px;
        background: linear-gradient(180deg, rgba(9, 12, 16, 0), rgba(9, 12, 16, 0.94) 34%);
      }

      .pause-panel {
        inset: 50% 18px auto 18px;
        transform: translateY(-50%);
        background: var(--panel-strong);
      }

      @media (min-width: 700px) {
        .panel {
          left: 18px;
          right: 18px;
          bottom: 18px;
          padding: 16px;
        }

        .garage-grid {
          grid-template-columns: 1.1fr 0.9fr;
          gap: 12px;
        }

        .hotspot-layer {
          left: 18px;
          right: 18px;
          bottom: 18px;
        }

        .is-illustration .meta-drawer,
        .is-shelter .meta-drawer {
          left: 18px;
          right: 18px;
          bottom: 194px;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="app">
      <canvas id="gameCanvas" width="390" height="844" aria-label="灰燼護航戰場"></canvas>

      <section class="hud" id="hud" aria-live="polite">
        <div class="hud-row">
          <div class="stat">
            <div class="stat-line">
              <span id="hudVehicle">鐵鴉號</span>
              <span id="hudHpText">HP 0 / 0</span>
            </div>
            <div class="bar"><i id="hpBar"></i></div>
            <div class="bar shield-bar" id="shieldBarWrap" hidden><i id="shieldBar"></i></div>
          </div>
          <div class="pill" id="hudWave">第 1 波</div>
          <button id="pauseBtn" type="button" aria-label="暫停">暫停</button>
        </div>
        <div class="hud-row">
          <div class="mods" id="hudMods">增益：無</div>
          <div class="pill" id="hudKills">擊殺 0</div>
          <div class="pill" id="hudParts">零件 0</div>
        </div>
        <div class="boss" id="bossHud">
          <div class="boss-title">
            <span id="bossName">母巢巨屍</span>
            <span id="bossHpText">0%</span>
          </div>
          <div class="bar"><i id="bossBar"></i></div>
          <div class="boss-telegraph" id="bossTelegraph"></div>
        </div>
      </section>
      <div class="event-banner" id="eventBanner" role="status" aria-live="polite" aria-atomic="true" hidden>
        <strong id="eventBannerTitle"></strong>
        <span id="eventBannerBody"></span>
      </div>
      <div class="gate-choice-layer" id="gateChoiceLayer" hidden></div>
      <div class="gate-choice-overlay" id="gateChoiceOverlay" role="dialog" aria-modal="true" aria-labelledby="gateChoiceTitle" hidden>
        <div class="supply-choice-panel">
          <div class="supply-choice-head">
            <strong id="gateChoiceTitle">增益門</strong>
            <span id="gateChoiceHint">選擇一項增益後繼續出勤</span>
          </div>
          <div class="supply-choice-list" id="gateChoiceList"></div>
        </div>
      </div>
      <div class="supply-choice-overlay" id="supplyChoiceOverlay" role="dialog" aria-modal="true" aria-labelledby="supplyChoiceTitle" hidden>
        <div class="supply-choice-panel">
          <div class="supply-choice-head">
            <strong id="supplyChoiceTitle">補給箱</strong>
            <span id="supplyChoiceHint">選擇一項補給後繼續出勤</span>
          </div>
          <div class="supply-choice-list" id="supplyChoiceList"></div>
        </div>
      </div>

      <div class="trailer-overlay" id="trailerOverlay" role="dialog" aria-modal="true" aria-labelledby="trailerRoomTitle" hidden>
        <div class="trailer-room-stage">
          <canvas id="trailerRoomCanvas" class="trailer-room-canvas" width="390" height="844" aria-label="拖車少女房間"></canvas>
        </div>
        <div class="trailer-panel">
          <div class="trailer-head">
            <div>
              <h2 id="trailerRoomTitle">拖車少女房間</h2>
              <p class="subtle" id="trailerStarterText">破爛逃生倉：目前只有床和舊報紙。</p>
            </div>
            <button id="closeTrailerRoomBtn" type="button" aria-label="關閉拖車房間">關閉</button>
          </div>
          <div class="trailer-resources">
            <span id="trailerGoodsText">拾荒物資 0</span>
            <span id="trailerBonusText">HP +0% · 傷害 +0% · 射速 +0% · 承傷 -0%</span>
          </div>
          <div class="trailer-room-body">
            <div class="trailer-column" aria-label="房間插槽" id="trailerSlotList"></div>
            <div class="trailer-column" aria-label="家具目錄" id="trailerFurnitureList"></div>
          </div>
        </div>
      </div>

      <section class="panel meta-panel is-fallback" id="garagePanel">
        <img id="shelterImage" class="shelter-image" alt="" decoding="async" draggable="false" hidden />
        <canvas id="shelterCanvas" class="shelter-canvas" width="390" height="844" aria-label="避難所基地場景" hidden></canvas>

        <div class="meta-summary panel-head">
          <h1>灰燼護航</h1>
          <p class="subtle" id="garageMeta">廢土零件 0</p>
          <div class="status" id="garageStatus" role="status" aria-live="polite" aria-atomic="true"></div>
        </div>

        <div class="hotspot-layer" id="hotspotLayer" aria-label="避難所互動" hidden>
          <button class="hotspot-btn hotspot-primary" id="sortieBtn" type="button" aria-label="開始出勤">出勤</button>
          <button class="hotspot-btn" id="upgradeHotspotBtn" type="button" aria-label="開啟升級工坊">升級</button>
          <button class="hotspot-btn" id="vehicleHotspotBtn" type="button" aria-label="開啟載具棚">載具</button>
          <button class="hotspot-btn" id="seriesHotspotBtn" type="button" aria-label="開啟成就牆">成就</button>
          <button class="hotspot-btn" id="trailerHotspotBtn" type="button" aria-label="開啟拖車房間">拖車</button>
          <button class="hotspot-btn" id="opsHotspotBtn" type="button" aria-label="開啟任務與設定">任務/設定</button>
          <button class="hotspot-btn danger" id="resetOverlayBtn" type="button" aria-label="清除存檔">清存檔</button>
        </div>

        <div class="meta-drawer" id="metaDrawer">
          <div class="meta-drawer-head">
            <h2 id="metaDrawerTitle">基地管理</h2>
            <button id="closeMetaDrawer" type="button" aria-label="關閉基地面板">關閉</button>
          </div>
          <div class="garage-grid">
            <section class="meta-section" data-meta-section="vehicle">
              <h2>載具</h2>
              <div class="vehicle-list" id="vehicleList"></div>
            </section>
            <section class="meta-section" data-meta-section="upgrades">
              <h2>升級</h2>
              <div class="upgrade-list" id="upgradeList"></div>
            </section>
            <section class="meta-section" data-meta-section="achievements">
              <h2>成就牆</h2>
              <div class="milestone-list" id="milestoneList"></div>
              <div class="event-codex-list" id="eventCodexList"></div>
              <div class="achievement-list" id="achievementList"></div>
              <footer class="series-footer" aria-label="阿軒的小遊戲系列">
                <div class="series-title">🎮 阿軒的小遊戲系列</div>
                <nav class="series-links" aria-label="姊妹作連結">
                  <a href="https://mars-tw.github.io/web-card-game-skill/templates/card-battle/" target="_blank" rel="noopener">卡牌對戰</a>
                  <a href="https://mars-tw.github.io/tower-defense-skill/" target="_blank" rel="noopener">無盡塔防</a>
                  <a href="https://mars-tw.github.io/pixel-idle-farm-skill/" target="_blank" rel="noopener">像素農場</a>
                </nav>
              </footer>
            </section>
            <section class="meta-section" data-meta-section="operations">
              <h2>任務板</h2>
              <div class="quest-list" id="questList"></div>
              <h2>設定</h2>
              <div class="settings-list" id="settingsPanel">
                <label class="settings-row">
                  <small>瞄準輔助</small>
                  <select id="aimAssistLevelSelect">
                    <option value="off">關</option>
                    <option value="low">低</option>
                    <option value="medium">中</option>
                    <option value="high">高</option>
                  </select>
                </label>
                <label class="settings-row">
                  <small>螢幕震動</small>
                  <input id="screenShakeToggle" type="checkbox" />
                </label>
                <label class="settings-row">
                  <small>音效</small>
                  <input id="soundToggle" type="checkbox" />
                </label>
                <label class="settings-row">
                  <small>出勤拖車</small>
                  <input id="showRunTrailerToggle" type="checkbox" />
                </label>
                <label class="settings-row">
                  <small>畫面特效</small>
                  <select id="fxLevelSelect">
                    <option value="full">完整</option>
                    <option value="reduced">精簡</option>
                    <option value="off">關閉</option>
                  </select>
                </label>
                <label class="settings-row">
                  <small>傷害數字</small>
                  <select id="damageTextDensitySelect">
                    <option value="all">全部</option>
                    <option value="large">僅大額</option>
                    <option value="off">關</option>
                  </select>
                </label>
                <label class="settings-row">
                  <small>效能模式</small>
                  <select id="performanceModeSelect">
                    <option value="auto">自動</option>
                    <option value="high">鎖高</option>
                    <option value="low">鎖低</option>
                  </select>
                </label>
                <label class="settings-row">
                  <small>文字大小</small>
                  <select id="fontSizeSelect">
                    <option value="small">小</option>
                    <option value="medium">中</option>
                    <option value="large">大</option>
                  </select>
                </label>
                <div class="settings-row" id="versionRow">
                  <small id="versionText">版本</small>
                  <button id="checkUpdateBtn" type="button" aria-label="檢查更新並套用">檢查更新</button>
                </div>
                <div class="settings-row" id="performanceDiagnostics">
                  <small id="performanceDiagnosticText">FPS --｜品質 --｜cap --</small>
                </div>
                <div class="save-manager" id="saveManager">
                  <strong>存檔管家</strong>
                  <textarea id="saveCodeBox" spellcheck="false" aria-label="存檔代碼"></textarea>
                  <div class="actions">
                    <button id="exportSaveBtn" type="button" aria-label="匯出存檔代碼">匯出</button>
                    <button id="importSaveBtn" type="button" aria-label="匯入存檔代碼">匯入</button>
                  </div>
                </div>
              </div>
            </section>
          </div>
          <div class="actions meta-actions">
            <button class="primary wide" id="startBtn" type="button" aria-label="開始出勤">出勤</button>
            <button id="resetBtn" type="button" aria-label="清除存檔">清除存檔</button>
            <button class="secondary" id="selectSkiffBtn" type="button" aria-label="切換可用載具">切換載具</button>
          </div>
        </div>
      </section>

      <section class="panel pause-panel" id="pausePanel" hidden>
        <div class="panel-head">
          <h2>暫停</h2>
          <p class="subtle">目前進度會保留在本局中。</p>
        </div>
        <div class="actions">
          <button class="primary" id="resumeBtn" type="button" aria-label="繼續遊戲">繼續</button>
          <button class="danger" id="quitBtn" type="button" aria-label="結束本局並結算">結束本局</button>
        </div>
      </section>

      <section class="panel" id="settlementPanel" hidden>
        <div class="panel-head">
          <h2>護航結算</h2>
          <p class="subtle" id="settlementSummary">本局獲得 0 廢土零件。</p>
        </div>
        <div class="settlement-list" id="settlementList"></div>
        <div class="settlement-badges" id="settlementBadges" role="status" aria-live="polite" aria-atomic="true" hidden></div>
        <div class="settlement-recommendation" id="settlementRecommendation" hidden>
          <strong id="settlementRecommendationTitle"></strong>
          <small id="settlementRecommendationDetail"></small>
          <button class="primary" id="recommendedUpgradeBtn" type="button" aria-label="前往建議升級">前往升級</button>
        </div>
        <button class="secondary run-analysis-toggle" id="runAnalysisToggleBtn" type="button" aria-label="展開本局分析">本局分析</button>
        <div class="run-analysis" id="runAnalysisPanel" hidden></div>
        <div class="actions">
          <button class="primary" id="againBtn" type="button" aria-label="再次出勤">再跑一趟</button>
          <button class="secondary" id="garageBtn" type="button" aria-label="回車庫升級">回車庫升級</button>
        </div>
      </section>
    </main>

    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        var startedAt = Date.now();
        var key = "ashes_convoy_html_boot_reload_R56";
        var controlledAtLoad = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (!controlledAtLoad) return;
          if (Date.now() - startedAt > 15000) return;
          if (sessionStorage.getItem(key) === "1") return;
          sessionStorage.setItem(key, "1");
          location.reload();
        });
        navigator.serviceWorker.getRegistration().then(function (registration) {
          if (!registration) return;
          return registration.update().then(function () {
            if (registration.waiting) registration.waiting.postMessage({ type: "SKIP_WAITING" });
          });
        }).catch(function () {});
      })();
    </script>

    <script src="src/sprites.js?v=R56"></script>
    <script src="src/sprite-renderer.js?v=R56"></script>
    <script src="src/shelter-scene.js?v=R56"></script>
    <script src="src/config.js?v=R56"></script>
    <script src="src/rules.js?v=R56"></script>
    <script src="src/fx.js?v=R56"></script>
    <script src="src/audio.js?v=R56"></script>
    <script src="src/game.js?v=R56"></script>
    <script src="src/ui.js?v=R56"></script>
