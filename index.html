<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta property="og:title" content="灰燼護航 ASHES CONVOY" />
    <meta property="og:description" content="駕駛裝甲車護送末世車隊，在沙暴與怪潮中殺出一條生路。" />
    <meta property="og:url" content="https://mars-tw.github.io/ashes-convoy/" />
    <meta property="og:image" content="https://mars-tw.github.io/ashes-convoy/assets/cover.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://mars-tw.github.io/ashes-convoy/assets/cover.png" />
    <meta name="theme-color" content="#111317" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest?v=R79" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png?v=R79" />
    <link rel="canonical" href="https://mars-tw.github.io/ashes-convoy/" />
    <title>灰燼護航</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111317;
        --panel: rgba(18, 22, 27, 0.92);
        --panel-strong: rgba(9, 12, 16, 0.96);
        --line: rgba(221, 211, 178, 0.26);
        --text: #f4ead8;
        --muted: #b8b0a3;
        --accent: #f0b64a;
        --accent-2: #5ed4cb;
        --danger: #e15f4f;
        --ok: #87d27d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overscroll-behavior: none;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -24px;
        pointer-events: none;
      }

      body::before {
        background:
          linear-gradient(90deg, rgba(3, 5, 7, 0.42), rgba(3, 5, 7, 0.06) 28%, rgba(3, 5, 7, 0.06) 72%, rgba(3, 5, 7, 0.42)),
          url("assets/ui/start-atmosphere-r79.png") center / cover no-repeat;
        filter: saturate(0.78) brightness(0.68);
        transform: scale(1.025);
      }

      body::after {
        background:
          radial-gradient(circle at 13% 28%, rgba(226, 123, 44, 0.42) 0 1px, transparent 2px),
          radial-gradient(circle at 78% 67%, rgba(240, 174, 73, 0.34) 0 1px, transparent 2px),
          radial-gradient(circle at 91% 18%, rgba(191, 94, 35, 0.3) 0 1px, transparent 2px),
          radial-gradient(ellipse at center, rgba(240, 182, 74, 0.035), rgba(2, 3, 5, 0.74) 76%);
        background-size: 170px 210px, 230px 280px, 310px 260px, 100% 100%;
        animation: ash-atmosphere-drift 18s linear infinite;
      }

      @keyframes ash-atmosphere-drift {
        from { background-position: 0 0, 0 0, 0 0, center; }
        to { background-position: 22px -64px, -18px -92px, 12px -76px, center; }
      }

      button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #232a31;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        touch-action: manipulation;
      }

      button:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--accent-2);
        outline-offset: 2px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .app {
        position: relative;
        z-index: 1;
        width: min(100vw, calc(100svh * 390 / 844));
        height: min(100svh, calc(100vw * 844 / 390));
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        overflow: hidden;
        background: transparent;
      }

      .battle-stage {
        position: relative;
        width: 100%;
        height: 100%;
        aspect-ratio: 390 / 844;
        container-type: inline-size;
        overflow: hidden;
        background: #0a0c0f;
      }

      .desktop-rail {
        display: none;
      }

      @media (min-width: 860px) and (pointer: fine) {
        body {
          place-items: stretch;
        }

        .app {
          --desktop-side-pad: clamp(8px, 1vw, 18px);
          --desktop-gap: clamp(8px, 0.9vw, 14px);
          --rail-w: clamp(64px, 5vw, 92px);
          --stage-max-h: clamp(844px, 74vw, 1644px);
          --stage-h: min(
            100svh,
            var(--stage-max-h),
            calc((100vw - (var(--desktop-side-pad) * 2) - (var(--rail-w) * 2) - (var(--desktop-gap) * 2)) * 844 / 390)
          );
          --stage-w: calc(var(--stage-h) * 390 / 844);
          width: 100vw;
          height: 100vh;
          height: 100svh;
          padding: 0 var(--desktop-side-pad);
          grid-template-columns: var(--rail-w) var(--stage-w) var(--rail-w);
          gap: var(--desktop-gap);
          justify-content: center;
          align-items: center;
          background:
            linear-gradient(90deg, rgba(7, 9, 11, 0.58), rgba(7, 9, 11, 0.02) 22%, rgba(7, 9, 11, 0.02) 78%, rgba(7, 9, 11, 0.58)),
            url("assets/ui/start-atmosphere-r79.png") center / cover no-repeat;
        }

        .battle-stage {
          width: var(--stage-w);
          height: var(--stage-h);
          justify-self: center;
          align-self: center;
          border: 1px solid rgba(223, 171, 93, 0.28);
          box-shadow:
            0 0 0 5px rgba(31, 25, 19, 0.72),
            0 0 0 7px rgba(191, 112, 43, 0.18),
            0 28px 80px rgba(0, 0, 0, 0.72);
        }

        .desktop-rail {
          position: relative;
          display: grid;
          align-self: stretch;
          align-content: center;
          min-width: 0;
          padding: 54px 0 10px;
        }

        .desktop-rail::before {
          position: absolute;
          top: calc(50% - 176px);
          color: rgba(220, 182, 128, 0.46);
          font-family: "Arial Narrow", "Roboto Condensed", sans-serif;
          font-size: 9px;
          font-weight: 800;
          letter-spacing: 0.22em;
          writing-mode: vertical-rl;
        }

        .rail-left::before { content: "BASE // 04"; right: 22px; }
        .rail-right::before { content: "OPS // 79"; left: 22px; }

        .rail-left {
          justify-items: end;
        }

        .rail-right {
          justify-items: start;
        }

        .rail-cluster {
          position: relative;
          display: grid;
          gap: 12px;
          width: 58px;
        }

        .rail-cluster::before {
          content: "";
          position: absolute;
          top: -18px;
          bottom: -18px;
          left: 50%;
          width: 1px;
          background: linear-gradient(transparent, rgba(211, 145, 66, 0.62) 18%, rgba(211, 145, 66, 0.2) 82%, transparent);
          box-shadow: 0 0 18px rgba(211, 112, 42, 0.24);
        }

        .rail-btn {
          position: relative;
          width: 58px;
          min-width: 58px;
          min-height: 58px;
          padding: 0;
          display: grid;
          place-items: center;
          border-color: rgba(217, 165, 93, 0.32);
          border-radius: 3px;
          background:
            linear-gradient(145deg, rgba(75, 55, 38, 0.72), rgba(15, 18, 20, 0.94) 52%),
            #111417;
          box-shadow:
            inset 0 1px 0 rgba(255, 222, 165, 0.12),
            inset 0 -7px 16px rgba(0, 0, 0, 0.35),
            0 12px 30px rgba(0, 0, 0, 0.34);
          transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .rail-btn::after {
          content: "";
          position: absolute;
          inset: 4px;
          border: 1px solid rgba(243, 211, 158, 0.08);
          pointer-events: none;
        }

        .rail-btn:hover {
          transform: translateY(-2px);
          border-color: rgba(241, 180, 82, 0.72);
          box-shadow: inset 0 1px 0 rgba(255, 222, 165, 0.2), 0 0 22px rgba(190, 102, 34, 0.2), 0 14px 32px rgba(0, 0, 0, 0.4);
        }

        .rail-btn span {
          display: block;
          color: var(--muted);
          font-size: 11px;
          line-height: 1;
        }

        .rail-icon {
          position: relative;
          z-index: 1;
          color: #e3a844;
          font-size: 20px;
          line-height: 1;
          text-shadow: 0 0 12px rgba(227, 114, 46, 0.36);
        }

      }

      #gameCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        touch-action: none;
      }

      .hud {
        position: absolute;
        inset: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) auto max(10px, env(safe-area-inset-left));
        display: none;
        gap: 8px;
        pointer-events: none;
        z-index: 6;
      }

      .hud.is-visible {
        display: grid;
      }

      .hud-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
      }

      .stat,
      .boss,
      .mods {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 13, 16, 0.74);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.22);
      }

      .stat {
        min-height: 44px;
        padding: 7px 9px;
        display: grid;
        gap: 4px;
      }

      .stat-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .bar {
        position: relative;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .bar > i {
        display: block;
        height: 100%;
        width: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--danger), var(--accent));
      }

      .shield-bar {
        height: 5px;
        background: rgba(94, 212, 203, 0.14);
      }

      .shield-bar[hidden] {
        display: none;
      }

      .shield-bar > i {
        background: linear-gradient(90deg, #2f8792, var(--accent-2));
      }

      .pill {
        min-height: 44px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 13, 16, 0.74);
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .hud button {
        pointer-events: auto;
        min-width: 44px;
        padding: 0 10px;
        background: rgba(35, 42, 49, 0.9);
      }

      .mods {
        min-height: 30px;
        padding: 6px 9px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
      }

      .hud-number-pop {
        animation: hud-number-pop 180ms cubic-bezier(0.2, 0.9, 0.3, 1.35);
        transform-origin: center;
      }

      @keyframes hud-number-pop {
        0% { transform: translateY(0) scale(1); }
        42% { transform: translateY(-3px) scale(1.14); color: #fff2bd; }
        100% { transform: translateY(0) scale(1); }
      }

      .hud.is-reduced .hud-number-pop {
        animation: none;
      }

      @media (prefers-reduced-motion: reduce) {
        body::after {
          animation: none;
        }

        .hud-number-pop {
          animation: none;
        }

        .mods {
          transition: none;
        }
      }

      body.font-small .hud,
      body.font-small .settlement-list,
      body.font-small .settlement-badges,
      body.font-small .settlement-recommendation,
      body.font-small .run-analysis,
      body.font-small .quest-list,
      body.font-small .settings-list {
        font-size: 12px;
      }

      body.font-large .hud,
      body.font-large .settlement-list,
      body.font-large .settlement-badges,
      body.font-large .settlement-recommendation,
      body.font-large .run-analysis,
      body.font-large .quest-list,
      body.font-large .settings-list {
        font-size: 15px;
      }

      body.font-small .quest-card strong,
      body.font-small .achievement strong,
      body.font-small .event-codex strong,
      body.font-small .settings-row small,
      body.font-small .quest-card small,
      body.font-small .settlement-recommendation small,
      body.font-small .run-analysis-section small {
        font-size: 11px;
      }

      body.font-large .quest-card strong,
      body.font-large .achievement strong,
      body.font-large .event-codex strong,
      body.font-large .settings-row small,
      body.font-large .quest-card small,
      body.font-large .settlement-recommendation small,
      body.font-large .run-analysis-section small {
        font-size: 14px;
      }

      .boss {
        display: none;
        min-height: 38px;
        padding: 7px 9px;
      }

      .boss.is-visible {
        display: grid;
        gap: 5px;
      }

      .boss-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .boss-telegraph {
        min-height: 16px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .event-banner {
        position: absolute;
        z-index: 8;
        left: 18px;
        right: 18px;
        top: max(96px, calc(env(safe-area-inset-top) + 96px));
        min-height: 48px;
        padding: 9px 12px;
        border: 1px solid rgba(240, 182, 74, 0.74);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.88);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.36);
        text-align: center;
        pointer-events: none;
      }

      .event-banner strong,
      .event-banner span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .event-banner strong {
        color: var(--accent);
        font-size: 14px;
      }

      .event-banner span {
        margin-top: 2px;
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
      }

      .event-banner[hidden] {
        display: none;
      }

      .gate-choice-layer {
        position: absolute;
        top: max(92px, calc(env(safe-area-inset-top) + 82px));
        left: 50%;
        z-index: 5;
        width: max-content;
        max-width: calc(100% - 28px);
        min-height: 30px;
        padding: 6px 11px;
        transform: translateX(-50%);
        overflow: hidden;
        border: 1px solid rgba(240, 182, 74, 0.58);
        border-radius: 999px;
        background: rgba(9, 12, 16, 0.82);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.34);
        color: #fff2bd;
        font-size: 12px;
        font-weight: 900;
        line-height: 16px;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
        pointer-events: none;
      }

      .gate-choice-layer[hidden] {
        display: none;
      }

      .supply-choice-overlay {
        position: absolute;
        top: max(132px, calc(env(safe-area-inset-top) + 122px));
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        z-index: 8;
        pointer-events: none;
      }

      .supply-choice-overlay[hidden] {
        display: none;
      }

      .supply-choice-panel {
        width: 100%;
        padding: 9px;
        border: 1px solid rgba(94, 212, 203, 0.55);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.88);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.48);
        pointer-events: auto;
      }

      .supply-choice-head {
        display: grid;
        gap: 3px;
        margin-bottom: 7px;
      }

      .supply-choice-head strong {
        color: var(--accent-2);
        font-size: 16px;
      }

      .supply-choice-head span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .supply-choice-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .supply-choice-btn {
        min-height: 68px;
        min-width: 0;
        padding: 9px 10px;
        text-align: left;
        border-color: rgba(94, 212, 203, 0.72);
        background: rgba(13, 24, 28, 0.82);
        touch-action: manipulation;
      }

      .supply-choice-btn b,
      .supply-choice-btn span,
      .supply-choice-btn small {
        display: block;
        overflow-wrap: anywhere;
      }

      .supply-choice-btn b {
        color: var(--text);
        font-size: 14px;
      }

      .supply-choice-btn span {
        margin-top: 3px;
        color: var(--accent-2);
        font-size: 13px;
        font-weight: 900;
      }

      .supply-choice-btn small {
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
      }

      .supply-choice-btn.is-maxed {
        border-color: rgba(255, 102, 102, 0.78);
        background: rgba(42, 14, 18, 0.86);
      }

      .choice-overflow-badge {
        display: block;
        margin-top: 5px;
        padding: 3px 5px;
        border: 1px solid rgba(255, 102, 102, 0.62);
        border-radius: 6px;
        color: #ffd1d1;
        background: rgba(255, 102, 102, 0.12);
        font-size: 10px;
        font-style: normal;
        font-weight: 900;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .touch-controls {
        display: none;
      }

      .virtual-joystick,
      .touch-action-btn,
      .quick-upgrade-wheel,
      .quick-upgrade-option {
        touch-action: none;
      }

      @media (pointer: coarse) {
        .touch-controls.is-visible {
          position: absolute;
          z-index: 7;
          inset: auto max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
          display: grid;
          grid-template-columns: 118px 1fr;
          align-items: end;
          gap: 14px;
          pointer-events: none;
        }

        .virtual-joystick {
          position: relative;
          width: 112px;
          height: 112px;
          border: 1px solid rgba(244, 234, 216, 0.24);
          border-radius: 50%;
          background: radial-gradient(circle, rgba(94, 212, 203, 0.18), rgba(9, 12, 16, 0.62) 62%);
          box-shadow: 0 16px 34px rgba(0, 0, 0, 0.38), inset 0 0 0 12px rgba(255, 255, 255, 0.035);
          pointer-events: auto;
        }

        .virtual-joystick-stick {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 46px;
          height: 46px;
          border: 1px solid rgba(94, 212, 203, 0.72);
          border-radius: 50%;
          background: rgba(94, 212, 203, 0.32);
          box-shadow: 0 8px 20px rgba(0, 0, 0, 0.38);
          transform: translate(-50%, -50%);
        }

        .touch-action-pad {
          justify-self: end;
          display: flex;
          gap: 9px;
          pointer-events: auto;
        }

        .touch-action-btn {
          width: 52px;
          min-width: 52px;
          height: 52px;
          min-height: 52px;
          padding: 0;
          border-radius: 50%;
          background: rgba(24, 29, 35, 0.82);
          box-shadow: 0 14px 28px rgba(0, 0, 0, 0.34);
          color: #fff4cf;
          font-size: 16px;
        }

        .touch-action-btn:active,
        .touch-action-btn.is-active {
          border-color: rgba(94, 212, 203, 0.86);
          background: rgba(94, 212, 203, 0.26);
        }
      }

      .quick-upgrade-wheel {
        position: absolute;
        z-index: 11;
        width: min(190px, calc(100% - 16px));
        padding: 54px 10px 10px;
        border: 1px solid rgba(240, 182, 74, 0.62);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.92);
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.42);
      }

      .quick-upgrade-wheel[hidden] {
        display: none;
      }

      .quick-upgrade-close {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 44px;
        min-width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        border-radius: 50%;
      }

      .quick-upgrade-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .quick-upgrade-option {
        min-height: 64px;
        padding: 6px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 2px;
        text-align: center;
        font-size: 11px;
        line-height: 1.15;
        background: rgba(35, 42, 49, 0.92);
      }

      .quick-upgrade-option b,
      .quick-upgrade-option small {
        display: block;
        max-width: 58px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .quick-upgrade-option small {
        color: var(--muted);
        font-size: 10px;
      }

      .trailer-overlay {
        position: absolute;
        inset: 0;
        z-index: 9;
        display: grid;
        grid-template-rows: minmax(260px, 46%) minmax(0, 1fr);
        gap: 10px;
        padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        background: rgba(5, 7, 10, 0.94);
        overflow: hidden;
      }

      .trailer-overlay[hidden] {
        display: none;
      }

      .trailer-room-stage {
        position: relative;
        min-height: 0;
        border: 1px solid rgba(240, 182, 74, 0.28);
        border-radius: 8px;
        overflow: hidden;
        background: #0b0d10;
      }

        color: #fff7ec;

        place-items: center;
        font-size: 10px;
        line-height: 1;
        box-shadow: 0 0 0 2px rgba(7, 9, 13, 0.82);

        display: none;

      .hotspot-primary {
        grid-column: 1;
        min-height: 62px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 8px 12px 8px 16px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 218, 139, 0.32), transparent 34%),
          linear-gradient(115deg, #c7832c, #9e4b25 58%, #6f2e1f);

        text-align: left;

          0 10px 22px rgba(0, 0, 0, 0.38);

      .hotspot-primary::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(100deg, transparent 12%, rgba(30, 11, 8, 0.18) 13% 14%, transparent 15% 72%, rgba(255, 236, 188, 0.12) 73% 74%, transparent 75%),

      .hotspot-primary:hover {
        transform: translateY(-2px);

        transform: translateY(1px);

      .cta-copy,
      .base-copy {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 1px;
      }

      .cta-copy strong {

        letter-spacing: 0.16em;
        line-height: 1;
      }

      .cta-copy small,
      .base-copy small {

        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      .cta-arrow {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;

        height: 30px;
        border: 1px solid rgba(255, 232, 180, 0.42);

        font-size: 23px;
        line-height: 1;

      .hotspot-base-toggle {

        min-height: 62px;

        place-items: center;
        border-color: rgba(139, 184, 178, 0.42);

      .base-copy strong {
        font-size: 14px;
        letter-spacing: 0.12em;
      }

      .base-copy small {
        color: rgba(164, 216, 208, 0.64);
      }

      .base-actions {
        position: absolute;
        left: max(12px, env(safe-area-inset-left));
        right: max(12px, env(safe-area-inset-right));
        bottom: calc(100% + 8px);
        z-index: 8;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(222, 175, 109, 0.34);
        background: rgba(10, 13, 14, 0.96);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.62);
      }

      .base-actions[hidden] {
        display: none;
      }

      .meta-drawer {
        position: relative;
        z-index: 4;
        scroll-padding-block: 72px 84px;
      }

      .is-illustration .meta-drawer,
      .is-shelter .meta-drawer {
        position: absolute;
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: calc(max(8px, env(safe-area-inset-bottom)) + 88px);
        max-height: min(60%, 520px, calc(100dvh - 188px));
        padding: 12px;
        overflow: auto;
        overscroll-behavior: contain;
        border: 1px solid rgba(244, 234, 216, 0.22);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.92);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.44);
        touch-action: pan-y;
      }

      .meta-drawer[hidden] {
        display: none;
      }

      .meta-drawer-head {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        padding-bottom: 8px;
        background: linear-gradient(180deg, rgba(9, 12, 16, 0.98), rgba(9, 12, 16, 0.9));
      }

      .meta-drawer-head button {
        min-height: 44px;
        padding: 0 10px;
      }

      .meta-drawer button,
      .meta-drawer select,
      .meta-drawer input,
      .meta-drawer textarea {
        scroll-margin-block: 72px 84px;
      }

      .meta-section[hidden] {
        display: none;
      }

      .is-illustration .meta-drawer .garage-grid,
      .is-shelter .meta-drawer .garage-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .is-illustration .meta-drawer .meta-section:not([hidden]),
      .is-shelter .meta-drawer .meta-section:not([hidden]) {
        grid-column: 1 / -1;
      }

      .is-fallback .shelter-image,
      .is-fallback .shelter-canvas,
      .is-fallback .start-art-stage {
        display: none;
      }

      .is-fallback .hotspot-layer {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin: 10px 0;
      }

      .is-fallback .meta-drawer {
        display: block;
      }

      .is-fallback .meta-drawer-head {
        display: none;
      }

      .is-fallback .meta-section {
        display: block;
      }

      .is-illustration #startBtn,
      .is-shelter #startBtn {
        display: none;
      }

      .meta-actions {
        margin-top: 10px;
        position: sticky;
        bottom: 0;
        padding-top: 8px;
        background: linear-gradient(180deg, rgba(9, 12, 16, 0), rgba(9, 12, 16, 0.94) 34%);
      }

      .pause-panel {
        inset: 50% 18px auto 18px;
        transform: translateY(-50%);
        background: var(--panel-strong);
      }

      @media (min-width: 700px) {
        .panel {
          left: 18px;
          right: 18px;
          bottom: 18px;
          padding: 16px;
        }

        .garage-grid {
          grid-template-columns: 1.1fr 0.9fr;
          gap: 12px;
        }

        .is-illustration .meta-drawer,
        .is-shelter .meta-drawer {
          left: 18px;
          right: 18px;
          bottom: 102px;
          padding: 16px;
        }
      }

      @container (max-width: 330px) {
        .is-illustration .meta-summary,
        .is-shelter .meta-summary {
          padding-inline: max(9px, env(safe-area-inset-left));
        }

        .start-logo {
          font-size: 27px;
        }

        .start-stat-chip {
          padding-inline: 3px;
        }

        .hotspot-layer {
          grid-template-columns: minmax(0, 1fr) 84px;
          padding-inline: max(8px, env(safe-area-inset-left));
        }

        .cta-copy small,
        .base-copy small {
          display: none;
        }
      }
    </style>

                  <button id="checkUpdateBtn" type="button" aria-label="檢查更新並套用">檢查更新</button>
                </div>
                <div class="settings-row" id="performanceDiagnostics">
                  <small id="performanceDiagnosticText">FPS --｜品質 --｜cap --</small>
                </div>
                <div class="save-manager" id="saveManager">
                  <strong>存檔管家</strong>
                  <textarea id="saveCodeBox" spellcheck="false" aria-label="存檔代碼"></textarea>
                  <div class="actions">
                    <button id="exportSaveBtn" type="button" aria-label="匯出存檔代碼">匯出</button>
                    <button id="importSaveBtn" type="button" aria-label="匯入存檔代碼">匯入</button>
                  </div>
                </div>
              </div>
            </section>
          </div>
          <div class="actions meta-actions">
            <button class="primary wide" id="startBtn" type="button" aria-label="開始出勤">出勤</button>
            <button id="resetBtn" type="button" aria-label="清除存檔">清除存檔</button>
            <button class="secondary" id="selectSkiffBtn" type="button" aria-label="切換可用載具">切換載具</button>
          </div>
        </div>
      </section>

      <section class="panel pause-panel" id="pausePanel" hidden>
        <div class="panel-head">
          <h2>暫停</h2>
          <p class="subtle">目前進度會保留在本局中。</p>
        </div>
        <div class="actions">
          <button class="primary" id="resumeBtn" type="button" aria-label="繼續遊戲">繼續</button>
          <button class="danger" id="quitBtn" type="button" aria-label="結束本局並結算">結束本局</button>
        </div>
      </section>

      <section class="panel" id="settlementPanel" hidden>
        <div class="panel-head">
          <h2>護航結算</h2>
          <p class="subtle" id="settlementSummary">本局獲得 0 廢土零件。</p>
        </div>
        <div class="settlement-list" id="settlementList"></div>
        <div class="settlement-badges" id="settlementBadges" role="status" aria-live="polite" aria-atomic="true" hidden></div>
        <div class="settlement-recommendation" id="settlementRecommendation" hidden>
          <strong id="settlementRecommendationTitle"></strong>
          <small id="settlementRecommendationDetail"></small>
          <button class="primary" id="recommendedUpgradeBtn" type="button" aria-label="前往建議升級">前往升級</button>
        </div>
        <button class="secondary run-analysis-toggle" id="runAnalysisToggleBtn" type="button" aria-label="展開本局分析">本局分析</button>
        <div class="run-analysis" id="runAnalysisPanel" hidden></div>
        <div class="actions">
          <button class="primary" id="againBtn" type="button" aria-label="再次出勤">再跑一趟</button>
          <button class="secondary" id="garageBtn" type="button" aria-label="回車庫升級">回車庫升級</button>
        </div>
      </section>
      </section>

      <nav class="desktop-rail rail-right" aria-label="任務捷徑">
        <div class="rail-cluster">
          <button class="rail-btn" id="railOpsBtn" type="button" aria-label="開啟任務板">
            <i class="rail-icon" aria-hidden="true">◎</i>
            <span>任務</span>
          </button>
          <button class="rail-btn" id="railAchievementsBtn" type="button" aria-label="開啟成就牆">
            <i class="rail-icon" aria-hidden="true">★</i>
            <span>成就</span>
          </button>
          <button class="rail-btn" id="railSettingsBtn" type="button" aria-label="開啟設定">
            <i class="rail-icon" aria-hidden="true">⚙</i>
            <span>設定</span>
          </button>
        </div>
      </nav>
    </main>

    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        var startedAt = Date.now();
        var key = "ashes_convoy_html_boot_reload_R79";
        var controlledAtLoad = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (!controlledAtLoad) return;
          if (Date.now() - startedAt > 15000) return;
          if (sessionStorage.getItem(key) === "1") return;
          sessionStorage.setItem(key, "1");
          location.reload();
        });
        navigator.serviceWorker.getRegistration().then(function (registration) {
          if (!registration) return;
          return registration.update().then(function () {
            if (registration.waiting) registration.waiting.postMessage({ type: "SKIP_WAITING" });
          });
        }).catch(function () {});
      })();
    </script>
