<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>灰燼護航</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111317;
        --panel: rgba(18, 22, 27, 0.92);
        --panel-strong: rgba(9, 12, 16, 0.96);
        --line: rgba(221, 211, 178, 0.26);
        --text: #f4ead8;
        --muted: #b8b0a3;
        --accent: #f0b64a;
        --accent-2: #5ed4cb;
        --danger: #e15f4f;
        --ok: #87d27d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        overscroll-behavior: none;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
      }

      button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #232a31;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        touch-action: manipulation;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .app {
        position: relative;
        width: min(100vw, calc(100svh * 390 / 844));
        max-width: 820px;
        height: min(100svh, calc(100vw * 844 / 390));
        max-height: 1180px;
        aspect-ratio: 390 / 844;
        overflow: hidden;
        background: #0a0c0f;
      }

      @media (min-width: 860px) {
        .app {
          width: min(46vw, 520px);
          height: min(96vh, 1125px);
          border: 1px solid rgba(244, 234, 216, 0.16);
        }
      }

      #gameCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        touch-action: none;
      }

      .hud {
        position: absolute;
        inset: max(10px, env(safe-area-inset-top)) 10px auto 10px;
        display: none;
        gap: 8px;
        pointer-events: none;
        z-index: 6;
      }

      .hud.is-visible {
        display: grid;
      }

      .hud-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
      }

      .stat,
      .boss,
      .mods {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 13, 16, 0.74);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.22);
      }

      .stat {
        min-height: 44px;
        padding: 7px 9px;
        display: grid;
        gap: 4px;
      }

      .stat-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .bar {
        position: relative;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .bar > i {
        display: block;
        height: 100%;
        width: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--danger), var(--accent));
      }

      .pill {
        min-height: 44px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(10, 13, 16, 0.74);
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .hud button {
        pointer-events: auto;
        min-width: 44px;
        padding: 0 10px;
        background: rgba(35, 42, 49, 0.9);
      }

      .mods {
        min-height: 30px;
        padding: 6px 9px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .boss {
        display: none;
        min-height: 38px;
        padding: 7px 9px;
      }

      .boss.is-visible {
        display: grid;
        gap: 5px;
      }

      .boss-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .boss-telegraph {
        min-height: 16px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .event-banner {
        position: absolute;
        z-index: 8;
        left: 18px;
        right: 18px;
        top: max(96px, calc(env(safe-area-inset-top) + 96px));
        min-height: 48px;
        padding: 9px 12px;
        border: 1px solid rgba(240, 182, 74, 0.74);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.88);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.36);
        text-align: center;
        pointer-events: none;
      }

      .event-banner strong,
      .event-banner span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .event-banner strong {
        color: var(--accent);
        font-size: 14px;
      }

      .event-banner span {
        margin-top: 2px;
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
      }

      .event-banner[hidden] {
        display: none;
      }

      .gate-choice-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      .gate-choice-layer[hidden] {
        display: none;
      }

      .gate-choice-btn {
        position: absolute;
        width: 112px;
        min-height: 68px;
        padding: 7px 8px;
        transform: translate(-50%, -50%);
        border-color: rgba(240, 182, 74, 0.88);
        background: rgba(9, 12, 16, 0.78);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.34);
        pointer-events: auto;
        touch-action: manipulation;
      }

      .gate-choice-btn b,
      .gate-choice-btn span,
      .gate-choice-btn small {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .gate-choice-btn b {
        color: var(--text);
        font-size: 16px;
      }

      .gate-choice-btn span {
        color: var(--accent);
        font-size: 18px;
        line-height: 1.1;
      }

      .gate-choice-btn small {
        color: var(--muted);
        font-size: 10px;
      }

      .panel {
        position: absolute;
        inset: auto 10px max(10px, env(safe-area-inset-bottom)) 10px;
        max-height: calc(100% - 24px);
        padding: 12px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.42);
        touch-action: pan-y;
      }

      .panel[hidden] {
        display: none;
      }

      .panel h1,
      .panel h2 {
        margin: 0;
        letter-spacing: 0;
      }

      .panel h1 {
        font-size: 28px;
        line-height: 1.05;
      }

      .panel h2 {
        font-size: 18px;
      }

      .panel-head {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .subtle {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .garage-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .vehicle-list,
      .upgrade-list,
      .settlement-list {
        display: grid;
        gap: 8px;
      }

      .vehicle {
        display: grid;
        grid-template-columns: 52px 1fr auto;
        gap: 10px;
        align-items: center;
        min-height: 72px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .vehicle.is-selected {
        border-color: rgba(240, 182, 74, 0.82);
        background: rgba(240, 182, 74, 0.1);
      }

      .vehicle.is-locked {
        border-color: rgba(184, 176, 163, 0.18);
        background: rgba(255, 255, 255, 0.028);
      }

      .vehicle-thumb {
        width: 44px;
        height: 64px;
        object-fit: contain;
        image-rendering: pixelated;
        filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.38));
      }

      .vehicle.is-locked .vehicle-thumb {
        opacity: 0.82;
        filter: grayscale(1) brightness(0.18) contrast(1.45) drop-shadow(0 5px 8px rgba(0, 0, 0, 0.38));
      }

      .vehicle-name {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 8px;
        font-weight: 900;
      }

      .vehicle small,
      .upgrade small {
        color: var(--muted);
        font-size: 12px;
      }

      .upgrade {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        min-height: 64px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .upgrade.is-special {
        border-color: rgba(94, 212, 203, 0.28);
        background: rgba(94, 212, 203, 0.06);
      }

      .achievement-list {
        display: grid;
        gap: 8px;
      }

      .achievement {
        display: grid;
        gap: 4px;
        min-height: 66px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .achievement.is-done {
        border-color: rgba(135, 210, 125, 0.45);
        background: rgba(135, 210, 125, 0.08);
      }

      .achievement strong {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 13px;
      }

      .achievement small {
        color: var(--muted);
        line-height: 1.35;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .actions .wide {
        grid-column: 1 / -1;
      }

      .primary {
        background: #d5932f;
        border-color: #f3cf70;
        color: #17110a;
      }

      .secondary {
        background: #17454a;
        border-color: rgba(94, 212, 203, 0.62);
      }

      .danger {
        background: #5a201d;
        border-color: rgba(225, 95, 79, 0.62);
      }

      .settlement-list {
        grid-template-columns: 1fr 1fr;
      }

      .settlement-item {
        min-height: 58px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .settlement-item b {
        display: block;
        margin-bottom: 4px;
        font-size: 18px;
      }

      .settlement-badges,
      .settlement-recommendation {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .settlement-badge,
      .settlement-recommendation {
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.045);
      }

      .settlement-badge {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .settlement-recommendation[hidden],
      .settlement-badges[hidden] {
        display: none;
      }

      .settlement-recommendation strong {
        display: block;
        margin-bottom: 4px;
      }

      .settlement-recommendation small {
        display: block;
        color: var(--muted);
        line-height: 1.4;
      }

      .settlement-recommendation button {
        width: 100%;
        margin-top: 8px;
      }

      .status {
        min-height: 22px;
        margin-top: 8px;
        color: var(--accent-2);
        font-size: 12px;
      }

      .series-footer {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(221, 211, 178, 0.18);
        color: var(--muted);
        font-size: 12px;
      }

      .series-title {
        margin-bottom: 7px;
        font-weight: 800;
      }

      .series-links {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .series-links a {
        min-height: 32px;
        padding: 7px 9px;
        border: 1px solid rgba(221, 211, 178, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        color: var(--muted);
        text-decoration: none;
        white-space: nowrap;
      }

      .meta-panel.is-illustration,
      .meta-panel.is-shelter {
        inset: 0;
        max-height: none;
        padding: 0;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #07090d;
        box-shadow: none;
        touch-action: none;
      }

      .meta-panel.is-illustration::after,
      .meta-panel.is-shelter::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0.06) 24%, rgba(0, 0, 0, 0.42) 100%),
          radial-gradient(circle at 50% 44%, rgba(255, 218, 150, 0.08), rgba(0, 0, 0, 0) 52%);
        pointer-events: none;
      }

      .shelter-image,
      .shelter-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .shelter-image {
        object-fit: cover;
        object-position: center center;
        background: #07090d;
      }

      .shelter-canvas {
        image-rendering: pixelated;
      }

      .shelter-image[hidden],
      .shelter-canvas[hidden],
      .hotspot-layer[hidden] {
        display: none;
      }

      .meta-summary {
        position: relative;
        z-index: 2;
      }

      .is-illustration .meta-summary,
      .is-shelter .meta-summary {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        padding: 10px 12px;
        border: 1px solid rgba(244, 234, 216, 0.18);
        border-radius: 8px;
        background: rgba(7, 9, 13, 0.72);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.72);
        pointer-events: none;
      }

      .is-illustration .meta-summary h1,
      .is-shelter .meta-summary h1 {
        font-size: 30px;
        line-height: 1.02;
      }

      .is-illustration .meta-summary .status,
      .is-shelter .meta-summary .status {
        min-height: 18px;
        margin-top: 4px;
      }

      .hotspot-layer {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: max(10px, env(safe-area-inset-bottom));
        z-index: 3;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(244, 234, 216, 0.18);
        border-radius: 8px;
        background: rgba(7, 9, 13, 0.68);
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
        pointer-events: auto;
      }

      .hotspot-btn {
        position: static;
        min-width: 0;
        min-height: 42px;
        padding: 8px 10px;
        border-color: rgba(244, 234, 216, 0.34);
        background: rgba(9, 12, 16, 0.72);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
        color: var(--text);
        pointer-events: auto;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.72);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hotspot-primary {
        grid-column: 1 / -1;
        min-height: 50px;
        background: rgba(213, 147, 47, 0.88);
        border-color: rgba(243, 207, 112, 0.92);
        color: #17110a;
        font-size: 18px;
        text-shadow: none;
      }

      .meta-drawer {
        position: relative;
        z-index: 4;
      }

      .is-illustration .meta-drawer,
      .is-shelter .meta-drawer {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: calc(max(10px, env(safe-area-inset-bottom)) + 176px);
        max-height: min(50%, 480px);
        padding: 12px;
        overflow: auto;
        border: 1px solid rgba(244, 234, 216, 0.22);
        border-radius: 8px;
        background: rgba(9, 12, 16, 0.92);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.44);
        touch-action: pan-y;
      }

      .meta-drawer[hidden] {
        display: none;
      }

      .meta-drawer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .meta-drawer-head button {
        min-height: 36px;
        padding: 0 10px;
      }

      .meta-section[hidden] {
        display: none;
      }

      .is-fallback .shelter-image,
      .is-fallback .shelter-canvas {
        display: none;
      }

      .is-fallback .hotspot-layer {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin: 10px 0;
      }

      .is-fallback .meta-drawer {
        display: block;
      }

      .is-fallback .meta-drawer-head {
        display: none;
      }

      .is-fallback .meta-section {
        display: block;
      }

      .is-illustration #startBtn,
      .is-shelter #startBtn {
        display: none;
      }

      .meta-actions {
        margin-top: 10px;
      }

      .pause-panel {
        inset: 50% 18px auto 18px;
        transform: translateY(-50%);
        background: var(--panel-strong);
      }

      @media (min-width: 700px) {
        .panel {
          left: 18px;
          right: 18px;
          bottom: 18px;
          padding: 16px;
        }

        .garage-grid {
          grid-template-columns: 1.1fr 0.9fr;
          gap: 12px;
        }

        .hotspot-layer {
          left: 18px;
          right: 18px;
          bottom: 18px;
        }

        .is-illustration .meta-drawer,
        .is-shelter .meta-drawer {
          left: 18px;
          right: 18px;
          bottom: 194px;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" id="app">
      <canvas id="gameCanvas" width="390" height="844" aria-label="灰燼護航戰場"></canvas>

      <section class="hud" id="hud" aria-live="polite">
        <div class="hud-row">
          <div class="stat">
            <div class="stat-line">
              <span id="hudVehicle">鐵鴉號</span>
              <span id="hudHpText">HP 0 / 0</span>
            </div>
            <div class="bar"><i id="hpBar"></i></div>
          </div>
          <div class="pill" id="hudWave">第 1 波</div>
          <button id="pauseBtn" type="button" aria-label="暫停">暫停</button>
        </div>
        <div class="hud-row">
          <div class="mods" id="hudMods">增益：無</div>
          <div class="pill" id="hudKills">擊殺 0</div>
          <div class="pill" id="hudParts">零件 0</div>
        </div>
        <div class="boss" id="bossHud">
          <div class="boss-title">
            <span id="bossName">母巢巨屍</span>
            <span id="bossHpText">0%</span>
          </div>
          <div class="bar"><i id="bossBar"></i></div>
          <div class="boss-telegraph" id="bossTelegraph"></div>
        </div>
      </section>
      <div class="event-banner" id="eventBanner" hidden>
        <strong id="eventBannerTitle"></strong>
        <span id="eventBannerBody"></span>
      </div>
      <div class="gate-choice-layer" id="gateChoiceLayer" hidden></div>

      <section class="panel meta-panel is-fallback" id="garagePanel">
        <img id="shelterImage" class="shelter-image" alt="" decoding="async" draggable="false" hidden />
        <canvas id="shelterCanvas" class="shelter-canvas" width="390" height="844" aria-label="避難所基地場景" hidden></canvas>

        <div class="meta-summary panel-head">
          <h1>灰燼護航</h1>
          <p class="subtle" id="garageMeta">廢土零件 0</p>
          <div class="status" id="garageStatus"></div>
        </div>

        <div class="hotspot-layer" id="hotspotLayer" aria-label="避難所互動" hidden>
          <button class="hotspot-btn hotspot-primary" id="sortieBtn" type="button">出勤</button>
          <button class="hotspot-btn" id="upgradeHotspotBtn" type="button">升級</button>
          <button class="hotspot-btn" id="vehicleHotspotBtn" type="button">載具</button>
          <button class="hotspot-btn" id="seriesHotspotBtn" type="button">成就</button>
          <button class="hotspot-btn danger" id="resetOverlayBtn" type="button">清存檔</button>
        </div>

        <div class="meta-drawer" id="metaDrawer">
          <div class="meta-drawer-head">
            <h2 id="metaDrawerTitle">基地管理</h2>
            <button id="closeMetaDrawer" type="button" aria-label="關閉基地面板">關閉</button>
          </div>
          <div class="garage-grid">
            <section class="meta-section" data-meta-section="vehicle">
              <h2>載具</h2>
              <div class="vehicle-list" id="vehicleList"></div>
            </section>
            <section class="meta-section" data-meta-section="upgrades">
              <h2>升級</h2>
              <div class="upgrade-list" id="upgradeList"></div>
            </section>
            <section class="meta-section" data-meta-section="achievements">
              <h2>成就牆</h2>
              <div class="achievement-list" id="achievementList"></div>
              <footer class="series-footer" aria-label="阿軒的小遊戲系列">
                <div class="series-title">🎮 阿軒的小遊戲系列</div>
                <nav class="series-links" aria-label="姊妹作連結">
                  <a href="https://mars-tw.github.io/web-card-game-skill/templates/card-battle/" target="_blank" rel="noopener">卡牌對戰</a>
                  <a href="https://mars-tw.github.io/tower-defense-skill/" target="_blank" rel="noopener">無盡塔防</a>
                  <a href="https://mars-tw.github.io/pixel-idle-farm-skill/" target="_blank" rel="noopener">像素農場</a>
                </nav>
              </footer>
            </section>
          </div>
          <div class="actions meta-actions">
            <button class="primary wide" id="startBtn" type="button">出勤</button>
            <button id="resetBtn" type="button">清除存檔</button>
            <button class="secondary" id="selectSkiffBtn" type="button">切換載具</button>
          </div>
        </div>
      </section>

      <section class="panel pause-panel" id="pausePanel" hidden>
        <div class="panel-head">
          <h2>暫停</h2>
          <p class="subtle">目前進度會保留在本局中。</p>
        </div>
        <div class="actions">
          <button class="primary" id="resumeBtn" type="button">繼續</button>
          <button class="danger" id="quitBtn" type="button">結束本局</button>
        </div>
      </section>

      <section class="panel" id="settlementPanel" hidden>
        <div class="panel-head">
          <h2>護航結算</h2>
          <p class="subtle" id="settlementSummary">本局獲得 0 廢土零件。</p>
        </div>
        <div class="settlement-list" id="settlementList"></div>
        <div class="settlement-badges" id="settlementBadges" hidden></div>
        <div class="settlement-recommendation" id="settlementRecommendation" hidden>
          <strong id="settlementRecommendationTitle"></strong>
          <small id="settlementRecommendationDetail"></small>
          <button class="primary" id="recommendedUpgradeBtn" type="button">前往升級</button>
        </div>
        <div class="actions">
          <button class="primary" id="againBtn" type="button">再跑一趟</button>
          <button class="secondary" id="garageBtn" type="button">回車庫升級</button>
        </div>
      </section>
    </main>
